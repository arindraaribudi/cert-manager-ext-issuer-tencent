name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image and release tag (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ${{ vars.GHCR_IMAGE || 'ghcr.io/arindraaribudi/cert-manager-ext-issuer-tencent' }}
  TAG: ${{ inputs.tag }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  image:
    name: publish-ghcr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Set build timestamp
        id: timestamp
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORMS }}
          sbom: true
          provenance: true
          build-args: |
            VCS_REF=${{ github.sha }}
            VCS_VERSION=${{ env.TAG }}
            BUILD_DATE=${{ steps.timestamp.outputs.ts }}
          annotations: |
            org.opencontainers.image.title=cert-manager-ext-issuer-tencent
            org.opencontainers.image.description=External issuer for cert-manager using Tencent Cloud SSL Certificates API.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.version=${{ env.TAG }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.timestamp.outputs.ts }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=ArindraAribudi
      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: ${{ steps.build.outputs.sbom }}
          fail_on_unmatched_files: false

  installer:
    name: build-and-publish-install-yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build install.yaml
        run: |
          mkdir -p bin
          make build-installer IMG=${{ env.GHCR_IMAGE }}:${{ env.TAG }}
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          files: dist/install.yaml
          fail_on_unmatched_files: false
          draft: false
      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$TAG" --latest --repo "$GITHUB_REPOSITORY"
